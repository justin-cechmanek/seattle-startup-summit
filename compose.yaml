services:
  redis-stack:
    image: redis/redis-stack:latest
    container_name: redis-stack
    ports:
      - "6379:6379"

  agent-memory-server:
    image: redislabs/agent-memory-server:latest
    container_name: agent-memory-server
    depends_on:
      - redis-stack
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      REDIS_URL: redis://redis-stack:6379
    ports:
      - "8000:8000"
